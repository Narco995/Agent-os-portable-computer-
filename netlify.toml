[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/agent-os run build"
  publish = "artifacts/agent-os/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"

[[redirects]]
  from = "/api/*"
  to = "https://placeholder.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
