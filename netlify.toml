[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/agent-os run build"
  publish = "artifacts/agent-os/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PORT = "3000"

# API proxy URL injected dynamically by GitHub Actions (.github/workflows/deploy.yml)
# Do not hardcode Railway URL here — it breaks on redeploys

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
