name: Deploy Agent OS → Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_PROJECT_ID: 972e9d01-0bc1-4068-a3ac-fa13a1b39a76

jobs:
  deploy:
    name: Deploy → Railway (API + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          echo "=== Deploying to Railway ==="
          railway up --service api-server --environment production --detach --project $RAILWAY_PROJECT_ID 2>&1
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ env.RAILWAY_PROJECT_ID }}

      - name: Get deployed URL
        run: |
          sleep 20
          URL=$(railway domain --service api-server --environment production 2>/dev/null | grep -oP 'https?://\S+' | head -1 || echo "check Railway dashboard")
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Agent OS deployed → Railway"
          echo " URL → ${URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ env.RAILWAY_PROJECT_ID }}
