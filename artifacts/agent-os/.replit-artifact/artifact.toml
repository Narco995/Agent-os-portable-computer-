kind = "web"
previewPath = "/"
title = "Agent OS - AI Portable Computer"
version = "1.0.0"
id = "artifacts/agent-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24372

[services.development]
run = "pnpm --filter @workspace/agent-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-os", "run", "build" ]
publicDir = "artifacts/agent-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24372"
BASE_PATH = "/"
